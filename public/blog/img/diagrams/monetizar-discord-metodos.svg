<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" role="img" aria-label="Las cinco formas de monetizar un servidor de Discord con su rango de ingresos estimado">
  <defs>
    <linearGradient id="dchip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#7a86ff"/>
    </linearGradient>
  </defs>
  <rect width="760" height="470" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="759" height="469" rx="16" fill="none" stroke="rgba(0,0,0,0.08)"/>

  <text x="32" y="50" font-family="Georgia, serif" font-size="27" fill="#1D1D1F">5 formas de monetizar un servidor de Discord</text>
  <line x1="32" y1="76" x2="728" y2="76" stroke="rgba(0,0,0,0.06)"/>

  <g font-family="DejaVu Sans, Verdana, sans-serif">
    <!-- row template: chip + title + caption + value pill -->
    <!-- 1 -->
    <circle cx="60" cy="128" r="22" fill="url(#dchip)"/>
    <text x="60" y="135" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">1</text>
    <text x="98" y="122" font-size="17" font-weight="700" fill="#1D1D1F">Posts patrocinados de marcas</text>
    <text x="98" y="144" font-size="13" fill="#86868B">Embed con imagen y enlace en tu canal de anuncios</text>
    <rect x="566" y="110" width="162" height="34" rx="17" fill="rgba(88,101,242,0.10)"/>
    <text x="647" y="132" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5865F2">30 – 600 €/mes</text>

    <!-- 2 -->
    <circle cx="60" cy="194" r="22" fill="url(#dchip)"/>
    <text x="60" y="201" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">2</text>
    <text x="98" y="188" font-size="17" font-weight="700" fill="#1D1D1F">Roles de pago y acceso premium</text>
    <text x="98" y="210" font-size="13" fill="#86868B">Suscripción mensual a canales VIP y contenido exclusivo</text>
    <rect x="566" y="176" width="162" height="34" rx="17" fill="rgba(88,101,242,0.10)"/>
    <text x="647" y="198" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5865F2">25 – 800 €/mes</text>

    <!-- 3 -->
    <circle cx="60" cy="260" r="22" fill="url(#dchip)"/>
    <text x="60" y="267" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">3</text>
    <text x="98" y="254" font-size="17" font-weight="700" fill="#1D1D1F">Eventos patrocinados</text>
    <text x="98" y="276" font-size="13" fill="#86868B">Torneos, Q&amp;As y giveaways con patrocinio de marca</text>
    <rect x="566" y="242" width="162" height="34" rx="17" fill="rgba(88,101,242,0.10)"/>
    <text x="647" y="264" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5865F2">100 – 300 €/evento</text>

    <!-- 4 -->
    <circle cx="60" cy="326" r="22" fill="url(#dchip)"/>
    <text x="60" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">4</text>
    <text x="98" y="320" font-size="17" font-weight="700" fill="#1D1D1F">Afiliados y CPA</text>
    <text x="98" y="342" font-size="13" fill="#86868B">Enlaces de afiliado en gaming, tech y finanzas</text>
    <rect x="566" y="308" width="162" height="34" rx="17" fill="rgba(88,101,242,0.10)"/>
    <text x="647" y="330" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5865F2">Variable / venta</text>

    <!-- 5 -->
    <circle cx="60" cy="392" r="22" fill="url(#dchip)"/>
    <text x="60" y="399" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">5</text>
    <text x="98" y="386" font-size="17" font-weight="700" fill="#1D1D1F">Discord-as-a-service para marcas</text>
    <text x="98" y="408" font-size="13" fill="#86868B">Montar y gestionar servidores para empresas</text>
    <rect x="566" y="374" width="162" height="34" rx="17" fill="rgba(88,101,242,0.10)"/>
    <text x="647" y="396" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5865F2">500 – 2.000 €/mes</text>
  </g>

  <line x1="32" y1="432" x2="728" y2="432" stroke="rgba(0,0,0,0.06)"/>
  <text x="728" y="456" text-anchor="end" font-family="DejaVu Sans, Verdana, sans-serif" font-size="12.5" font-weight="700" fill="#5865F2">channelad.io</text>
</svg>
