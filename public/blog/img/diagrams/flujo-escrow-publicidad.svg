<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" role="img" aria-label="Diagrama del flujo de escrow en una campaña de publicidad: pago a custodia, fondos retenidos, publicación y verificación con liberación del pago">
  <defs>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f3ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c4b5fd"/>
    </marker>
  </defs>
  <rect width="760" height="340" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="759" height="339" rx="16" fill="none" stroke="rgba(0,0,0,0.08)"/>

  <text x="32" y="48" font-family="Georgia, serif" font-size="26" fill="#1D1D1F">Cómo protege tu dinero el escrow</text>
  <text x="32" y="74" font-family="DejaVu Sans, Verdana, sans-serif" font-size="14" fill="#86868B">El pago queda en custodia y solo se libera cuando el anuncio se ha publicado y verificado</text>

  <!-- connectors -->
  <g stroke="#c4b5fd" stroke-width="2" fill="none">
    <line x1="186" y1="200" x2="206" y2="200" marker-end="url(#arrow)"/>
    <line x1="374" y1="200" x2="394" y2="200" marker-end="url(#arrow)"/>
    <line x1="562" y1="200" x2="582" y2="200" marker-end="url(#arrow)"/>
  </g>

  <g font-family="DejaVu Sans, Verdana, sans-serif">
    <!-- step 1 -->
    <rect x="28" y="110" width="158" height="170" rx="14" fill="url(#node)" stroke="rgba(124,58,237,0.18)"/>
    <circle cx="60" cy="146" r="17" fill="#7C3AED"/>
    <text x="60" y="152" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="46" y="196" font-size="15" font-weight="700" fill="#1D1D1F">Pago a custodia</text>
    <text x="46" y="222" font-size="12.5" fill="#6b6b70"><tspan x="46" dy="0">El anunciante paga</tspan><tspan x="46" dy="17">por adelantado. El</tspan><tspan x="46" dy="17">dinero aún no llega</tspan><tspan x="46" dy="17">al canal.</tspan></text>

    <!-- step 2 -->
    <rect x="216" y="110" width="158" height="170" rx="14" fill="url(#node)" stroke="rgba(124,58,237,0.18)"/>
    <circle cx="248" cy="146" r="17" fill="#7C3AED"/>
    <text x="248" y="152" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="234" y="196" font-size="15" font-weight="700" fill="#1D1D1F">Fondos retenidos</text>
    <text x="234" y="222" font-size="12.5" fill="#6b6b70"><tspan x="234" dy="0">Channelad guarda el</tspan><tspan x="234" dy="17">importe en una cuenta</tspan><tspan x="234" dy="17">de garantía neutral.</tspan></text>

    <!-- step 3 -->
    <rect x="404" y="110" width="158" height="170" rx="14" fill="url(#node)" stroke="rgba(124,58,237,0.18)"/>
    <circle cx="436" cy="146" r="17" fill="#7C3AED"/>
    <text x="436" y="152" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="422" y="196" font-size="15" font-weight="700" fill="#1D1D1F">Publicación</text>
    <text x="422" y="222" font-size="12.5" fill="#6b6b70"><tspan x="422" dy="0">El canal publica el</tspan><tspan x="422" dy="17">anuncio acordado en</tspan><tspan x="422" dy="17">la fecha pactada.</tspan></text>

    <!-- step 4 -->
    <rect x="582" y="110" width="158" height="170" rx="14" fill="url(#node)" stroke="rgba(37,211,102,0.30)"/>
    <circle cx="614" cy="146" r="17" fill="#10b981"/>
    <text x="614" y="152" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="600" y="196" font-size="15" font-weight="700" fill="#1D1D1F">Pago liberado</text>
    <text x="600" y="222" font-size="12.5" fill="#6b6b70"><tspan x="600" dy="0">Se verifica la entrega</tspan><tspan x="600" dy="17">y el dinero se libera</tspan><tspan x="600" dy="17">al canal.</tspan></text>
  </g>

  <text x="728" y="316" text-anchor="end" font-family="DejaVu Sans, Verdana, sans-serif" font-size="12.5" font-weight="700" fill="#7C3AED">channelad.io</text>
</svg>
