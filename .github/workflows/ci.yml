name: CI

on:
  push:
    branches: [main, work]
  pull_request:

# Cancel any in-progress run on the same branch when a new push arrives.
# Saves Action minutes and gives faster feedback on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    # Normal wall-clock is ~3 min. 20 catches stuck jobs (MMS hangs,
    # network blip) without false positives on a slow runner day.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Cache the MongoDB binary that mongodb-memory-server downloads on
      # first use (currently 6.0.14, ~150 MB). Without this, every CI run
      # pays ~40 s of download + extract before tests can boot. The key
      # embeds the binary version so bumping MMS auto-invalidates.
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mms-mongodb-6.0.14-${{ runner.os }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm test -- --runInBand --coverage --coverageReporters=text-summary --coverageReporters=lcov

      # Upload coverage even on failure so a debug pass has the data.
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Build
        run: npm run build

  # Non-blocking security audit. Surfaces high/critical vulns in the
  # PR check list without blocking merge — transitives shouldn't stop
  # a deploy but we want them visible. Runs in parallel with `quality`.
  security:
    name: npm audit (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Don't fail the workflow if audit finds something. The UI still
    # shows a yellow/red check so reviewers see it.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install (prod deps only)
        run: npm ci --omit=dev --prefer-offline --no-audit

      - name: Audit (high + critical only)
        run: npm audit --omit=dev --audit-level=high
