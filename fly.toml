# fly.toml — Channelad backend test deploy
#
# Free-tier sizing: 1 shared-cpu-1x VM, 512 MB RAM. Auto-stop when idle so
# the free allowance lasts. Bump to 1 GB + min_machines_running=1 once we
# start running the Baileys worker for real (sessions can't survive
# auto-stop without re-pairing).
#
# After editing, validate with:  flyctl config validate
# Reference: https://fly.io/docs/reference/configuration/

app = "channelad-api-test"           # change to whatever `fly launch` names it
primary_region = "cdg"                # Paris — Fly deprecated 'mad' (Madrid) in 2026, cdg is the closest replacement (~30 ms to Iberia)

kill_signal = "SIGTERM"
kill_timeout = "15s"                  # server.js shutdown allows 10s grace

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8080"
  # Hint to the app that we are NOT on Vercel (some code paths key off this).
  RUNTIME_PLATFORM = "fly"
  # This single always-on machine is the background-job worker: run the
  # in-process scheduler (lib/jobScheduler.js) here. Keep it OFF anywhere else
  # (Vercel, any extra machine) so the heavy jobs only ever run once.
  ENABLE_BACKGROUND_JOBS = "true"

# ── HTTP service ─────────────────────────────────────────────────────────────
[http_service]
  internal_port = 8080
  force_https = true
  # Baileys holds long-lived WhatsApp WebSocket sessions in memory — a stopped
  # machine drops every paired user and forces a cold start (~8s) on the next
  # request, which the browser fetch in LinkWhatsAppPage times out on. So the
  # machine must NEVER auto-stop. "off" guarantees always-on (min_machines is
  # only a floor under "stop"/"suspend", and with a single machine Fly can
  # still stop it — "off" is the only hard guarantee).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# ── VM sizing ────────────────────────────────────────────────────────────────
[[vm]]
  size = "shared-cpu-1x"
  # 1 GB (not 512) for headroom: the in-process job scheduler runs GramJS
  # (telegram-intel, 527 channels) alongside the Baileys worker + Socket.io.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

# ── Persistent volume for Baileys WhatsApp pairing state ────────────────────
# Without the volume sessions are lost on every redeploy. 1 GB is plenty
# (sessions are < 50 MB each).
[mounts]
  source = "channelad_wa_sessions"
  destination = "/app/data/whatsapp-session"
  processes = ["app"]

# WHATSAPP_SESSION_PATH se setea via flyctl secrets para que server.js:138
# arranque el worker contra el path del volumen montado arriba.

# ── Crons (use fly machines run for now; see MIGRATION_FLY.md) ───────────────
# Fly does not have a native cron primitive yet. Options documented in
# MIGRATION_FLY.md §Crons:
#   (a) keep node-cron in-process (already wired in lib/campaignCron.js)
#   (b) trigger via GitHub Actions hitting the existing /api/jobs/* paths
#   (c) `fly machines run` from an external scheduler
