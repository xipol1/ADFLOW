<!-- Preheader: La disputa ha sido resuelta -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="padding: 40px 40px 20px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
            <div style="font-size: 48px; line-height: 1; margin-bottom: 16px;">&#9878;</div>
            <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1.2;">
              Disputa resuelta
            </h1>
            <p style="margin: 0; font-size: 16px; color: #64748b; line-height: 1.5;">
              Hola <strong style="color: #1e293b;">{{nombre}}</strong>, la disputa ha sido revisada y resuelta.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Resolution card -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;">
        <tr>
          <td style="background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%); padding: 20px 24px; border-bottom: 1px solid #e2e8f0;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; color: #6366f1; text-transform: uppercase; letter-spacing: 0.5px;">
                  &#9878; Resoluci&oacute;n
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="padding: 24px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="padding-bottom: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                  <span style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;">Campa&ntilde;a</span>
                  <br>
                  <span style="font-size: 15px; font-weight: 600; color: #1e293b;">{{campaignName}}</span>
                </td>
              </tr>
              <tr>
                <td style="padding-bottom: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                  <span style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;">Resoluci&oacute;n</span>
                  <br>
                  <span style="font-size: 14px; color: #475569; line-height: 1.5;">{{resolution}}</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Outcome -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #eef2ff; border-radius: 12px; border: 1px solid #c7d2fe;">
        <tr>
          <td style="padding: 24px; text-align: center;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
                  <span style="font-size: 12px; color: #4338ca; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px;">Resultado final</span>
                  <span style="font-size: 18px; font-weight: 700; color: #4338ca; line-height: 1.4;">{{outcome}}</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Support -->
  <tr>
    <td style="padding: 0 40px 40px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
        <tr>
          <td style="padding: 16px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; color: #64748b; line-height: 1.5; text-align: center;">
            Si tienes dudas sobre esta resoluci&oacute;n, puedes contactarnos en
            <a href="mailto:{{SUPPORT_EMAIL}}" style="color: #6366f1; font-weight: 600;">{{SUPPORT_EMAIL}}</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
