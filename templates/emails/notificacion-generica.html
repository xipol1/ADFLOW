<!-- Preheader: {{titulo}} -->
<!--
  Generic fallback notification template. Used by services/notificationService.js
  for any notification `tipo` not explicitly mapped to a dedicated template
  (e.g. campana.nueva, campana.publicada). Renders title + message with the
  standard variables {{nombre}}, {{titulo}}, {{mensaje}}, {{APP_NAME}}, {{APP_URL}}.
  Self-contained so it works whether or not it's wrapped by base.html.
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="padding: 40px 40px 16px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
            <div style="font-size: 40px; line-height: 1; margin-bottom: 16px;">&#128226;</div>
            <h1 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: #1e293b; line-height: 1.3;">
              {{titulo}}
            </h1>
            <p style="margin: 0; font-size: 14px; color: #64748b; line-height: 1.5;">
              Hola {{nombre}},
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="padding: 0 40px 8px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
        <tr>
          <td style="padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #334155; line-height: 1.6;">
            {{mensaje}}
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="padding: 24px 40px 40px 40px; text-align: center;" class="padding-mobile">
      <a href="{{APP_URL}}" style="display: inline-block; background-color: #6366f1; color: #ffffff; text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; padding: 12px 28px; border-radius: 8px;">
        Abrir {{APP_NAME}}
      </a>
    </td>
  </tr>
</table>
