<!-- Preheader: Has recibido una nueva rese&#241;a -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="padding: 40px 40px 20px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
            <div style="font-size: 48px; line-height: 1; margin-bottom: 16px;">&#11088;</div>
            <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1.2;">
              Nueva rese&ntilde;a
            </h1>
            <p style="margin: 0; font-size: 16px; color: #64748b; line-height: 1.5;">
              Hola <strong style="color: #1e293b;">{{creatorName}}</strong>, alguien ha dejado una rese&ntilde;a en tu canal.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Review card -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden;">
        <tr>
          <td style="background: linear-gradient(135deg, #fefce8 0%, #fef9c3 100%); padding: 20px 24px; border-bottom: 1px solid #fde68a;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 600; color: #92400e; text-transform: uppercase; letter-spacing: 0.5px;">
                  &#11088; Rese&ntilde;a para {{channelName}}
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td style="padding: 24px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <!-- Star rating -->
              <tr>
                <td style="padding-bottom: 20px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                  <span style="font-size: 32px; letter-spacing: 4px; color: #f59e0b;">{{rating}}</span>
                </td>
              </tr>
              <!-- Review text -->
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <tr>
                      <td style="padding: 20px; font-size: 15px; color: #475569; line-height: 1.6; font-style: italic;">
                        &ldquo;{{comment}}&rdquo;
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Tip -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #eef2ff; border-radius: 8px; border-left: 4px solid #6366f1;">
        <tr>
          <td style="padding: 16px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; color: #3730a3; line-height: 1.5;">
            <strong>Consejo:</strong> Responder a las rese&ntilde;as demuestra profesionalismo y ayuda a atraer m&aacute;s anunciantes a tu canal.
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- CTA -->
  <tr>
    <td style="padding: 0 40px 40px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
        <tr>
          <td style="border-radius: 8px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);">
            <a href="{{reviewUrl}}" style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border: none; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; line-height: 1; text-decoration: none; padding: 14px 36px; color: #ffffff; display: inline-block;">
              Ver rese&ntilde;a &rarr;
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
