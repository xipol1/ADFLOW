<!-- Preheader: Has ganado creditos por un referido -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="padding: 40px 40px 20px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
            <div style="font-size: 48px; line-height: 1; margin-bottom: 16px;">&#128176;</div>
            <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1.2;">
              Has ganado creditos
            </h1>
            <p style="margin: 0; font-size: 16px; color: #64748b;">
              Hola <strong style="color: #1e293b;">{{nombre}}</strong>, un referido tuyo ha completado una campana.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Commission details -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f0fdf4; border-radius: 12px; border: 1px solid #bbf7d0;">
        <tr>
          <td style="padding: 24px; text-align: center;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align: center;">
                  <p style="margin: 0 0 4px 0; font-size: 13px; color: #16a34a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
                    Credito generado
                  </p>
                  <p style="margin: 0 0 12px 0; font-size: 36px; font-weight: 900; color: #15803d; line-height: 1;">
                    +{{creditoGenerado}}
                  </p>
                  <p style="margin: 0; font-size: 14px; color: #64748b;">
                    5% de la campana de <strong>{{valorCampana}}</strong> completada por <strong>{{referidoNombre}}</strong>
                  </p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Balance summary -->
  <tr>
    <td style="padding: 0 40px 30px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;">
        <tr>
          <td style="padding: 20px 24px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 50%; text-align: center; padding: 8px;">
                  <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b;">Creditos totales</p>
                  <p style="margin: 0; font-size: 20px; font-weight: 800; color: #1e293b;">{{creditosTotales}}</p>
                </td>
                <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 50%; text-align: center; padding: 8px; border-left: 1px solid #e2e8f0;">
                  <p style="margin: 0 0 4px 0; font-size: 12px; color: #64748b;">Nivel actual</p>
                  <p style="margin: 0; font-size: 20px; font-weight: 800; color: #6366f1;">{{nivelActual}}</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- CTA -->
  <tr>
    <td style="padding: 0 40px 40px 40px;" class="padding-mobile">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
        <tr>
          <td style="background-color: #6366f1; border-radius: 10px;">
            <a href="{{APP_URL}}/creator/referrals" style="display: inline-block; padding: 14px 32px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none;">
              Ver mis creditos
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
