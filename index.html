<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FAFAFA">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Channelad">

    <!-- SEO & Open Graph -->
    <meta name="description" content="Channelad es el marketplace de publicidad en comunidades reales. Conecta anunciantes con canales de WhatsApp, Telegram y Discord verificados. Pagos protegidos y metricas en tiempo real.">
    <meta name="keywords" content="publicidad comunidades, WhatsApp ads, Telegram ads, Discord ads, marketplace publicidad, monetizar canal, comprar publicidad, channelad">
    <meta name="author" content="Channelad">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Channelad — Publicidad en comunidades que escuchan">
    <meta property="og:description" content="Conecta con canales verificados de WhatsApp, Telegram y Discord. Pagos protegidos con escrow y metricas en tiempo real.">
    <meta property="og:site_name" content="Channelad">
    <meta property="og:locale" content="es_ES">
    <meta property="og:url" content="https://channelad.io">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Channelad — Publicidad en comunidades que escuchan">
    <meta name="twitter:description" content="Conecta con canales verificados de WhatsApp, Telegram y Discord. Pagos protegidos con escrow y metricas en tiempo real.">

    <link rel="canonical" href="https://channelad.io">
    <title>Channelad — Publicidad en comunidades que escuchan</title>
  </head>
  <body>
    <script>
      // Set theme before React to prevent FOUC
      (function(){
        var t = localStorage.getItem('channelad-theme') || localStorage.getItem('adflow-theme');
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
